{% load static %}


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Trabajo - Plataforma Gestión de Proyectos</title>
    
    <link rel="stylesheet" href="{% get_static_prefix %}css/{{ contexto_css }}.css">

</head>
<body>
    <header class="header">
        <h1>Dashboard de {{contexto_nombre}}</h1>
        <div class="user-info">
            <span>{{ usuario.nombre_completo }}</span>
            <a href="{% url 'auth:logout' %}" class="logout-btn">Cerrar Sesión</a>
        </div>
    </header>

    <!-- Mostrar mensajes -->
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="container">

        {% block content %}

        {% endblock %}

    </div>
</body>
</html>
